version: "3.8"

services:
  webcasa:
    build: .
    container_name: webcasa
    ports:
      - "39921:39921" # Panel UI
      - "80:80" # HTTP
      - "443:443" # HTTPS
    volumes:
      # Caddy stores its certificates/config under <data-dir>/caddy_data and
      # /caddy_config (internal/caddy.Manager sets XDG_* there), i.e. inside this
      # single data volume — so certs persist across upgrades automatically and
      # no separate Caddy volume is needed.
      - webcasa-data:/app/data
    environment:
      - WEBCASA_PORT=39921
      # JWT secret auto-generated on first run and persisted in data/.jwt_secret
      # To set explicitly: WEBCASA_JWT_SECRET=<your-random-64-char-hex-string>
    restart: unless-stopped

volumes:
  webcasa-data:
